name: Deploy

on:
  push:
    branches: [main]

env:
  BOT_IMAGE: ghcr.io/rast53/energy-reglaments-bot/bot
  CRAWLER_IMAGE: ghcr.io/rast53/energy-reglaments-bot/crawler
  INDEXER_IMAGE: ghcr.io/rast53/energy-reglaments-bot/indexer

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push bot
        uses: docker/build-push-action@v5
        with:
          context: ./bot
          push: true
          tags: |
            ${{ env.BOT_IMAGE }}:${{ github.sha }}
            ${{ env.BOT_IMAGE }}:latest

      - name: Build & push crawler
        uses: docker/build-push-action@v5
        with:
          context: ./crawler
          push: true
          tags: |
            ${{ env.CRAWLER_IMAGE }}:${{ github.sha }}
            ${{ env.CRAWLER_IMAGE }}:latest

      - name: Build & push indexer
        uses: docker/build-push-action@v5
        with:
          context: ./indexer
          push: true
          tags: |
            ${{ env.INDEXER_IMAGE }}:${{ github.sha }}
            ${{ env.INDEXER_IMAGE }}:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to vps-tw-server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: BOT_TOKEN,OPENROUTER_API_KEY,OPENCLAW_API_KEY,DATABASE_URL,POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,ADMIN_IDS,HTTPS_PROXY
          script: |
            set -e
            cd /opt/energy-reglaments-bot

            cat > .env << ENVEOF
            BOT_TOKEN=${BOT_TOKEN}
            OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
            OPENCLAW_API_KEY=${OPENCLAW_API_KEY}
            DATABASE_URL=${DATABASE_URL}
            POSTGRES_USER=${POSTGRES_USER}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            POSTGRES_DB=${POSTGRES_DB}
            ADMIN_IDS=${ADMIN_IDS}
            HTTPS_PROXY=${HTTPS_PROXY}
            ENVEOF
            chmod 600 .env

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull bot
            docker compose up -d bot
            sleep 5
            docker compose ps
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENCLAW_API_KEY: ${{ secrets.OPENCLAW_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          ADMIN_IDS: ${{ secrets.ADMIN_IDS }}
          HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}

