version: "3.8"

services:
  bot:
    build: ./bot
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENCLAW_URL=${OPENCLAW_URL}
      - OPENCLAW_API_KEY=${OPENCLAW_API_KEY}
      - QDRANT_URL=${QDRANT_URL}
      - DATABASE_URL=${DATABASE_URL}
      - ADMIN_IDS=${ADMIN_IDS}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      - openclaw
      - qdrant
      - postgres
    restart: unless-stopped

  openclaw:
    image: alpine/openclaw:latest
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    volumes:
      - openclaw-data:/data
      - ./openclaw-workspace/workspace:/data/workspace
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-energy}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-energy}
      - POSTGRES_DB=${POSTGRES_DB:-energy}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  crawler:
    build: ./crawler
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - QDRANT_URL=${QDRANT_URL}
      - CRAWLER_VERIFY_SSL=${CRAWLER_VERIFY_SSL:-false}
      - CRAWLER_BASE_URL=${CRAWLER_BASE_URL:-https://www.np-sr.ru}
      - CRAWLER_DELAY_SEC=${CRAWLER_DELAY_SEC:-2}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-openai/text-embedding-3-large}
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-reglaments}
      - QDRANT_VECTOR_SIZE=${QDRANT_VECTOR_SIZE:-3072}
    volumes:
      - files-data:/app/files
    depends_on:
      - postgres
      - qdrant
    restart: unless-stopped

volumes:
  openclaw-data:
  qdrant-data:
  postgres-data:
  files-data:
